<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" width="1400" height="820">
  <defs>
    <marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#55524D" stroke-width="0.8"/>
    </marker>
    <marker id="ah-accent" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#D4874A" stroke-width="0.8"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="#0E0E0F"/>

  <text x="700" y="36" text-anchor="middle" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.16em">USER EXPERIENCE ARCHITECTURE</text>

  <!-- User persona -->
  <rect x="40" y="64" width="200" height="120" rx="14" fill="#1C1B1A" stroke="rgba(242,238,230,0.1)" stroke-width="1"/>
  <circle cx="80" cy="104" r="18" fill="#252321" stroke="rgba(242,238,230,0.08)" stroke-width="1"/>
  <text x="80" y="109" text-anchor="middle" fill="#D4874A" font-family="Instrument Serif, serif" font-size="18" font-style="italic">C</text>
  <text x="108" y="100" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="600" font-size="13">Cabin crew</text>
  <text x="108" y="116" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Flight attendant</text>
  <text x="60" y="150" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.08em">Primary user · mobile-first</text>
  <text x="60" y="164" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.08em">In-flight · limited connectivity</text>

  <line x1="240" y1="124" x2="290" y2="124" stroke="#55524D" stroke-width="1" marker-end="url(#ah)"/>

  <!-- Login -->
  <rect x="300" y="84" width="150" height="80" rx="12" fill="#1C1B1A" stroke="rgba(97,138,204,0.2)" stroke-width="1"/>
  <text x="375" y="112" text-anchor="middle" fill="#618ACC" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.12em">SIGN IN</text>
  <text x="375" y="132" text-anchor="middle" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="12">Email + password</text>
  <text x="375" y="148" text-anchor="middle" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Role assigned per airline</text>

  <line x1="450" y1="124" x2="500" y2="124" stroke="#55524D" stroke-width="1" marker-end="url(#ah)"/>

  <!-- HOME screen -->
  <rect x="510" y="64" width="170" height="140" rx="14" fill="#1C1B1A" stroke="rgba(242,238,230,0.1)" stroke-width="1"/>
  <rect x="530" y="84" width="130" height="6" rx="3" fill="#D4874A" opacity="0.6"/>
  <text x="595" y="110" text-anchor="middle" fill="#F2EEE6" font-family="Instrument Serif, serif" font-size="18">Home</text>
  <text x="530" y="132" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Select aircraft + flight</text>
  <text x="530" y="146" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Quick item lookup</text>
  <text x="530" y="160" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Load flight-specific data</text>
  <text x="530" y="186" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9">ENTRY POINT</text>

  <!-- Primary tasks label -->
  <text x="40" y="244" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.14em">PRIMARY TASKS</text>

  <!-- GALLEY MAP -->
  <rect x="40" y="264" width="240" height="190" rx="14" fill="#1C1B1A" stroke="rgba(212,135,74,0.2)" stroke-width="1"/>
  <rect x="60" y="284" width="200" height="6" rx="3" fill="#D4874A" opacity="0.4"/>
  <text x="160" y="314" text-anchor="middle" fill="#F2EEE6" font-family="Instrument Serif, serif" font-size="18">Galley Map</text>
  <text x="60" y="340" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Spatial view of aircraft galleys</text>
  <text x="60" y="358" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Tap position → trolley detail</text>
  <text x="60" y="376" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Color-coded by category</text>
  <rect x="60" y="400" width="200" height="36" rx="8" fill="rgba(212,135,74,0.08)" stroke="rgba(212,135,74,0.15)" stroke-width="0.5"/>
  <text x="72" y="416" fill="#D4874A" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.06em">KEY DECISION</text>
  <text x="72" y="430" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Spatial nav over flat list — matches</text>
  <text x="72" y="440" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">crew mental model of aircraft</text>

  <!-- ITEMS -->
  <rect x="310" y="264" width="240" height="190" rx="14" fill="#1C1B1A" stroke="rgba(97,138,204,0.2)" stroke-width="1"/>
  <rect x="330" y="284" width="200" height="6" rx="3" fill="#618ACC" opacity="0.4"/>
  <text x="430" y="314" text-anchor="middle" fill="#F2EEE6" font-family="Instrument Serif, serif" font-size="18">Items</text>
  <text x="330" y="340" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Browse by category</text>
  <text x="330" y="358" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Search by name, code, description</text>
  <text x="330" y="376" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Stock levels + location count</text>
  <rect x="330" y="400" width="200" height="36" rx="8" fill="rgba(97,138,204,0.08)" stroke="rgba(97,138,204,0.15)" stroke-width="0.5"/>
  <text x="342" y="416" fill="#618ACC" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.06em">KEY DECISION</text>
  <text x="342" y="430" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Category cards → filtered list with</text>
  <text x="342" y="440" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">sort toggles for fast pre-flight scan</text>

  <!-- INVENTORY -->
  <rect x="580" y="264" width="240" height="190" rx="14" fill="#1C1B1A" stroke="rgba(62,207,131,0.2)" stroke-width="1"/>
  <rect x="600" y="284" width="200" height="6" rx="3" fill="#3ECF83" opacity="0.4"/>
  <text x="700" y="314" text-anchor="middle" fill="#F2EEE6" font-family="Instrument Serif, serif" font-size="18">Inventory</text>
  <text x="600" y="340" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Post-flight quantity tracking</text>
  <text x="600" y="358" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Per-position used/available counts</text>
  <text x="600" y="376" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Progress bar + category filters</text>
  <rect x="600" y="400" width="200" height="36" rx="8" fill="rgba(62,207,131,0.08)" stroke="rgba(62,207,131,0.15)" stroke-width="0.5"/>
  <text x="612" y="416" fill="#3ECF83" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.06em">KEY DECISION</text>
  <text x="612" y="430" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Editable quantity fields per position</text>
  <text x="612" y="440" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">— faster than bottle-level sliders</text>

  <!-- ISSUES -->
  <rect x="850" y="264" width="240" height="190" rx="14" fill="#1C1B1A" stroke="rgba(204,97,97,0.2)" stroke-width="1"/>
  <rect x="870" y="284" width="200" height="6" rx="3" fill="#CC6161" opacity="0.4"/>
  <text x="970" y="314" text-anchor="middle" fill="#F2EEE6" font-family="Instrument Serif, serif" font-size="18">Issues</text>
  <text x="870" y="340" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Report damage, missing items</text>
  <text x="870" y="358" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Severity + passengers affected</text>
  <text x="870" y="376" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Persists across crew rotations</text>
  <rect x="870" y="400" width="200" height="36" rx="8" fill="rgba(204,97,97,0.08)" stroke="rgba(204,97,97,0.15)" stroke-width="0.5"/>
  <text x="882" y="416" fill="#CC6161" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.06em">KEY DECISION</text>
  <text x="882" y="430" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Structured form over free text —</text>
  <text x="882" y="440" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">makes reports actionable for ops</text>

  <!-- PROFILE -->
  <rect x="1120" y="264" width="240" height="120" rx="14" fill="#1C1B1A" stroke="rgba(242,238,230,0.08)" stroke-width="1"/>
  <rect x="1140" y="284" width="200" height="6" rx="3" fill="#55524D" opacity="0.4"/>
  <text x="1240" y="314" text-anchor="middle" fill="#F2EEE6" font-family="Instrument Serif, serif" font-size="18">Profile</text>
  <text x="1140" y="340" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">User details + airline info</text>
  <text x="1140" y="358" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="11">Account deletion (Apple req.)</text>

  <!-- Home → screen arrows -->
  <path d="M550,204 L550,230 L160,230 L160,264" stroke="#55524D" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <path d="M580,204 L580,230 L430,230 L430,264" stroke="#55524D" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <path d="M620,204 L620,230 L700,230 L700,264" stroke="#55524D" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <path d="M650,204 L650,230 L970,230 L970,264" stroke="#55524D" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <path d="M670,204 L670,230 L1240,230 L1240,264" stroke="#55524D" stroke-width="1" fill="none" marker-end="url(#ah)"/>
  <text x="700" y="242" text-anchor="middle" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.1em">VIA BOTTOM NAVIGATION</text>

  <!-- Design constraints -->
  <text x="40" y="504" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.14em">DESIGN CONSTRAINTS</text>

  <rect x="40" y="524" width="260" height="110" rx="14" fill="#1C1B1A" stroke="rgba(242,238,230,0.08)" stroke-width="1"/>
  <text x="60" y="550" fill="#D4874A" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em">OFFLINE-FIRST</text>
  <text x="60" y="570" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="12">No connectivity at altitude</text>
  <text x="60" y="590" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Local state persists without network</text>
  <text x="60" y="604" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Optimistic UI updates</text>
  <text x="60" y="618" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Sync on reconnection</text>

  <rect x="320" y="524" width="260" height="110" rx="14" fill="#1C1B1A" stroke="rgba(242,238,230,0.08)" stroke-width="1"/>
  <text x="340" y="550" fill="#3ECF83" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em">MULTI-TENANT</text>
  <text x="340" y="570" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="12">One app, many airlines</text>
  <text x="340" y="590" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Each airline sees only their data</text>
  <text x="340" y="604" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Branding + config per tenant</text>
  <text x="340" y="618" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">No code changes to onboard</text>

  <rect x="600" y="524" width="260" height="110" rx="14" fill="#1C1B1A" stroke="rgba(242,238,230,0.08)" stroke-width="1"/>
  <text x="620" y="550" fill="#618ACC" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em">MOBILE-FIRST</text>
  <text x="620" y="570" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="12">Designed for one-handed use</text>
  <text x="620" y="590" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Thumb-reachable touch targets</text>
  <text x="620" y="604" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Bottom nav for primary actions</text>
  <text x="620" y="618" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Glanceable during turbulence</text>

  <rect x="880" y="524" width="260" height="110" rx="14" fill="#1C1B1A" stroke="rgba(242,238,230,0.08)" stroke-width="1"/>
  <text x="900" y="550" fill="#CC6161" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em">ROLE-BASED VIEWS</text>
  <text x="900" y="570" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="12">Right info for the right role</text>
  <text x="900" y="590" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Crew: view, count, report</text>
  <text x="900" y="604" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Managers: resolve + oversight</text>
  <text x="900" y="618" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Admin: full configuration</text>

  <!-- Core user flow -->
  <text x="40" y="680" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.14em">CORE USER FLOW — PRE-FLIGHT TO POST-FLIGHT</text>

  <rect x="40" y="700" width="145" height="72" rx="12" fill="#252321" stroke="rgba(242,238,230,0.06)" stroke-width="0.5"/>
  <text x="112" y="724" text-anchor="middle" fill="#D4874A" font-family="JetBrains Mono, monospace" font-size="9">01</text>
  <text x="112" y="742" text-anchor="middle" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="11">Select flight</text>
  <text x="112" y="758" text-anchor="middle" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Aircraft + route</text>

  <line x1="185" y1="736" x2="215" y2="736" stroke="#D4874A" stroke-width="1" marker-end="url(#ah-accent)"/>

  <rect x="225" y="700" width="145" height="72" rx="12" fill="#252321" stroke="rgba(242,238,230,0.06)" stroke-width="0.5"/>
  <text x="297" y="724" text-anchor="middle" fill="#D4874A" font-family="JetBrains Mono, monospace" font-size="9">02</text>
  <text x="297" y="742" text-anchor="middle" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="11">Check galley</text>
  <text x="297" y="758" text-anchor="middle" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Map + positions</text>

  <line x1="370" y1="736" x2="400" y2="736" stroke="#D4874A" stroke-width="1" marker-end="url(#ah-accent)"/>

  <rect x="410" y="700" width="145" height="72" rx="12" fill="#252321" stroke="rgba(242,238,230,0.06)" stroke-width="0.5"/>
  <text x="482" y="724" text-anchor="middle" fill="#D4874A" font-family="JetBrains Mono, monospace" font-size="9">03</text>
  <text x="482" y="742" text-anchor="middle" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="11">Browse items</text>
  <text x="482" y="758" text-anchor="middle" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Search + verify</text>

  <line x1="555" y1="736" x2="585" y2="736" stroke="#D4874A" stroke-width="1" marker-end="url(#ah-accent)"/>

  <rect x="595" y="700" width="145" height="72" rx="12" fill="#252321" stroke="rgba(242,238,230,0.06)" stroke-width="0.5"/>
  <text x="667" y="724" text-anchor="middle" fill="#D4874A" font-family="JetBrains Mono, monospace" font-size="9">04</text>
  <text x="667" y="742" text-anchor="middle" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="11">Count inventory</text>
  <text x="667" y="758" text-anchor="middle" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Used + remaining</text>

  <line x1="740" y1="736" x2="770" y2="736" stroke="#D4874A" stroke-width="1" marker-end="url(#ah-accent)"/>

  <rect x="780" y="700" width="145" height="72" rx="12" fill="#252321" stroke="rgba(242,238,230,0.06)" stroke-width="0.5"/>
  <text x="852" y="724" text-anchor="middle" fill="#D4874A" font-family="JetBrains Mono, monospace" font-size="9">05</text>
  <text x="852" y="742" text-anchor="middle" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="11">Report issues</text>
  <text x="852" y="758" text-anchor="middle" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="9">Type + severity</text>

  <line x1="925" y1="736" x2="955" y2="736" stroke="#D4874A" stroke-width="1" marker-end="url(#ah-accent)"/>

  <rect x="965" y="700" width="145" height="72" rx="12" fill="#D4874A"/>
  <text x="1037" y="724" text-anchor="middle" fill="#0E0E0F" font-family="JetBrains Mono, monospace" font-size="9">06</text>
  <text x="1037" y="742" text-anchor="middle" fill="#0E0E0F" font-family="Inter Tight, sans-serif" font-weight="600" font-size="11">Submit to airline</text>
  <text x="1037" y="758" text-anchor="middle" fill="rgba(14,14,15,0.6)" font-family="Inter Tight, sans-serif" font-size="9">Syncs to ops system</text>

  <!-- IA sidebar -->
  <rect x="1160" y="524" width="200" height="250" rx="14" fill="#1C1B1A" stroke="rgba(242,238,230,0.08)" stroke-width="1"/>
  <text x="1180" y="550" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em">INFORMATION ARCH.</text>
  <text x="1180" y="574" fill="#F2EEE6" font-family="Inter Tight, sans-serif" font-weight="500" font-size="11">5 primary screens</text>
  <text x="1180" y="592" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Bottom tab navigation</text>
  <text x="1180" y="612" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">2-level drill-down max</text>
  <text x="1180" y="632" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">No hamburger menus</text>
  <text x="1180" y="652" fill="#8A8578" font-family="Inter Tight, sans-serif" font-size="10">Every action ≤ 3 taps</text>
  <text x="1180" y="684" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.1em">DESIGN TOOLS</text>
  <rect x="1180" y="696" width="48" height="18" rx="4" fill="#252321"/><text x="1204" y="709" text-anchor="middle" fill="#8A8578" font-family="JetBrains Mono, monospace" font-size="9">Figma</text>
  <rect x="1234" y="696" width="68" height="18" rx="4" fill="#252321"/><text x="1268" y="709" text-anchor="middle" fill="#8A8578" font-family="JetBrains Mono, monospace" font-size="9">Next.js</text>
  <rect x="1180" y="720" width="80" height="18" rx="4" fill="#252321"/><text x="1220" y="733" text-anchor="middle" fill="#8A8578" font-family="JetBrains Mono, monospace" font-size="9">Capacitor</text>
  <rect x="1266" y="720" width="56" height="18" rx="4" fill="#252321"/><text x="1294" y="733" text-anchor="middle" fill="#8A8578" font-family="JetBrains Mono, monospace" font-size="9">Xcode</text>
  <rect x="1180" y="744" width="70" height="18" rx="4" fill="#252321"/><text x="1215" y="757" text-anchor="middle" fill="#8A8578" font-family="JetBrains Mono, monospace" font-size="9">Tailwind</text>

  <text x="700" y="800" text-anchor="middle" fill="#55524D" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.12em">CREWGALLEY · DESIGNED AND SHIPPED BY DIEGO CEREZO · 2024–2026</text>
</svg>
